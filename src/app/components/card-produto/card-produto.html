<div class="card h-100">
    <img [src]="produtoRecebido.image" [alt]="produtoRecebido.title" class="card-img-top">
    <div class="card-body">
        <h5 class="card-title" [title]="produtoRecebido.title">
            {{ produtoRecebido.title | uppercase | truncate:15 }}
        </h5>
        @if(produtoRecebido.price > 150) {
            <p>Promoção 15% off: {{ produtoRecebido.price | discount:15 | currency: 'BRL' }}</p>
        }
        <p>{{ produtoRecebido.price | currency: 'BRL' }}</p>
    </div>
        <button class="btn btn-primary w-100" (click)="clicouComprar()">Adicionar ao carrinho</button>
</div>
